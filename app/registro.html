<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Copa Elite</title>
    <link rel="shortcut icon" alt="Favicon" href="assets/img/logo.png" type="image/x-icon">
    <meta name="author" content="Braian Quintero">
    <meta name="description" content="Taller 2 de Maquetación web">
    <meta name="keywords" content="TALLER, taller, Taller">
    <meta name="theme-color" content="#ffffff">
    <meta name="MobileOptimized" content="width">
    <meta name="HandheldFriendly" content="true">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-traslucent">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" 
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
     crossorigin="anonymous">
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body class="bg-dark min-vh-100 d-flex align-items-center justify-content-center py-5">

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-md-9 col-lg-7 col-xl-6">

        <div class="text-center mb-4">
            <i class="bi bi-trophy-fill text-warning" style="font-size:3rem;"></i>
            <h4 class="text-white fw-bold mt-2 mb-0">Copa Élite FC</h4>
            <p class="text-white-50 small">Registro de participante</p>
          </a>
        </div>

        <div class="card border-0 shadow-lg">
          <div class="card-header bg-primary text-white text-center py-3">
            <h5 class="mb-0 fw-bold"><i class="bi bi-person-plus-fill me-2"></i>Crear Cuenta</h5>
          </div>

          <div class="card-body p-4 p-md-5">
            <div class="row g-3 mb-3">
              <div class="col-md-6">
                <div class="form-floating">
                  <input type="text" class="form-control" id="nombre" placeholder="Nombre"/>
                  <label for="nombre"><i class="bi bi-person me-1"></i>Nombre</label>
                </div>
              </div>
              <div class="col-md-6">
                <div class="form-floating">
                  <input type="text" class="form-control" id="apellidos" placeholder="Apellidos"/>
                  <label for="apellidos"><i class="bi bi-person me-1"></i>Apellidos</label>
                </div>
              </div>
            </div>

            <div class="row g-3 mb-3">
              <div class="col-md-6">
                <div class="form-floating">
                  <input type="email" class="form-control" id="correo" placeholder="Correo"/>
                  <label for="correo"><i class="bi bi-envelope me-1"></i>Correo electrónico</label>
                </div>
              </div>
              <div class="col-md-6">
                <div class="form-floating">
                  <input type="tel" class="form-control" id="telefono" placeholder="Teléfono"/>
                  <label for="telefono"><i class="bi bi-telephone me-1"></i>Teléfono / WhatsApp</label>
                </div>
              </div>
            </div>

            <div class="row g-3 mb-3">
              <div class="col-md-6">
                <div class="form-floating">
                  <input type="text" class="form-control" id="documento" placeholder="Documento"/>
                  <label for="documento"><i class="bi bi-card-text me-1"></i>Nº Documento</label>
                </div>
              </div>
              <div class="col-md-6">
                <div class="form-floating">
                  <input type="date" class="form-control" id="fechaNac" placeholder="Fecha de nacimiento"/>
                  <label for="fechaNac"><i class="bi bi-calendar me-1"></i>Fecha de nacimiento</label>
                </div>
              </div>
            </div>

            <div class="form-floating mb-3">
              <select class="form-select" id="categoria">
                <option value="" selected disabled>Selecciona una categoría</option>
                <option value="elite">Categoría Élite (Mayores)</option>
                <option value="sub23">Categoría Sub-23</option>
                <option value="femenina">Categoría Femenina</option>
              </select>
              <label for="categoria"><i class="bi bi-diagram-3 me-1"></i>Categoría del torneo</label>
            </div>

            <div class="form-floating mb-3">
              <input type="text" class="form-control" id="equipo" placeholder="Nombre del equipo"/>
              <label for="equipo"><i class="bi bi-people me-1"></i>Nombre del equipo</label>
            </div>

            <div class="row g-3 mb-3">
              <div class="col-md-6">
                <div class="form-floating">
                  <input type="password" class="form-control" id="pass" placeholder="Contraseña"/>
                  <label for="pass"><i class="bi bi-lock me-1"></i>Contraseña</label>
                </div>
              </div>
              <div class="col-md-6">
                <div class="form-floating">
                  <input type="password" class="form-control" id="pass2" placeholder="Confirmar"/>
                  <label for="pass2"><i class="bi bi-lock-fill me-1"></i>Confirmar contraseña</label>
                </div>
              </div>
            </div>

            <div class="form-check mb-4">
              <input class="form-check-input" type="checkbox" id="terminos"/>
              <label class="form-check-label small" for="terminos">
                Acepto los <a href="#" class="text-decoration-none">Términos y Condiciones</a> y el <a href="#" class="text-decoration-none">Reglamento del Torneo</a>.
              </label>
            </div>

            <button class="btn btn-primary w-100 btn-lg mb-3">
              <i class="bi bi-check-circle me-2"></i>Crear Cuenta
            </button>

            <hr class="my-3"/>

            <p class="text-center small text-muted mb-0">
              ¿Ya tienes cuenta?
              <a href="login.html" class="text-decoration-none fw-semibold">Inicia sesión aquí</a>
            </p>

          </div>
        </div>

        <div class="text-center mt-4">
          <a href="../index.html" class="text-white-50 small text-decoration-none">
            <i class="bi bi-arrow-left me-1"></i>Volver al sitio principal
          </a>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
