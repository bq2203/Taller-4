<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Mundial Barrial</title>
    <link rel="shortcut icon" alt="Favicon" href="assets/img/logo.png" type="image/x-icon">
    <meta name="author" content="Braian Quintero">
    <meta name="description" content="Taller 2 de Maquetación web">
    <meta name="keywords" content="TALLER, taller, Taller">
    <meta name="theme-color" content="#ffffff">
    <meta name="MobileOptimized" content="width">
    <meta name="HandheldFriendly" content="true">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-traslucent">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" 
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
     crossorigin="anonymous">
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body class="bg-dark min-vh-100 d-flex align-items-center justify-content-center py-5">

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-10 col-md-7 col-lg-5 col-xl-4">
        <div class="text-center mb-4">
            <i class="bi bi-globe-americas text-warning" style="font-size:3rem;"></i>
            <h4 class="text-white fw-bold mt-2 mb-0">Mundial Barrial</h4>
            <p class="text-white-50 small">Portal de participantes</p>
        </div>

        <div class="card border-0 shadow-lg">
          <div class="card-body p-4 p-md-5">
            <h5 class="fw-bold mb-1">Bienvenido de nuevo</h5>
            <p class="text-muted small mb-4">Ingresa tus credenciales para acceder a tu cuenta del mundialito.</p>

            <div class="form-floating mb-3">
              <input type="email" class="form-control" id="correo" placeholder="nombre@ejemplo.com"/>
              <label for="correo"><i class="bi bi-envelope me-1"></i>Correo electrónico</label>
            </div>

            <div class="form-floating mb-3">
              <input type="password" class="form-control" id="password" placeholder="Contraseña"/>
              <label for="password"><i class="bi bi-lock me-1"></i>Contraseña</label>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="recordarme"/>
                <label class="form-check-label small" for="recordarme">Recordarme</label>
              </div>
              <a href="recuperar.html" class="small text-decoration-none text-primary">¿Olvidaste tu contraseña?</a>
            </div>

            <button class="btn btn-primary w-100 btn-lg mb-3" type="button">
              <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
            </button>
            <hr class="my-3"/>
            <p class="text-center small text-muted mb-0">
              ¿No tienes cuenta?
              <a href="registro.html" class="text-decoration-none fw-semibold">Regístrate aquí</a>
            </p>
          </div>
        </div>

        <div class="text-center mt-4">
          <a href="../index.html" class="text-white-50 small text-decoration-none">
            <i class="bi bi-arrow-left me-1"></i>Volver al sitio principal
          </a>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
